<!DOCTYPE html>
<html lang="pt-br">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VZ | Design Digital Estratégico & Identidade de Luxo</title>
    
    <!-- Tailwind CSS -->

            color: white;
            font-family: 'Inter', sans-serif;

        }

        .font-serif { font-family: 'Playfair Display', serif; }
        .font-sans { font-family: 'Inter', sans-serif; }

        .bg-glass {
            background: rgba(255, 255, 255, 0.02);

        }

        .text-gold-champagne { color: var(--gold-champagne); }
        .bg-gold-champagne { background-color: var(--gold-champagne); }
        .border-gold-champagne { border-color: var(--gold-champagne); }

        .btn-gold {
            background: var(--gold-champagne);
            color: var(--luxury-black);
