<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VZ — Digitalização Premium</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@400;600;800&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #05010a; color: #ffffff; overflow-x: hidden; }

        .chrome-text {
            font-family: 'Cinzel', serif;
            background: linear-gradient(180deg, #ffffff 0%, #f8fafc 45%, #a78bfa 50%, #7c3aed 55%, #c084fc 100%);
            background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
            display: inline-block;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(167, 139, 250, 0.2);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }

        /* O HEXAGONO DESIGNER */
        .hexagon-shape {
            width: 180px;
            height: 200px;
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.2) 0%, rgba(30, 10, 60, 0.6) 100%);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
        }

        .hexagon-shape::before {
            content: '';
            position: absolute;
            inset: 2px;
            background: #0d061a;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            z-index: 1;
        }

        .hexagon-icon {
            position: relative;
            z-index: 2;
            filter: drop-shadow(0 0 15px #7c3aed);
        }

        .btn-chrome {
            background: linear-gradient(135deg, #7c3aed 0%, #5b21b6 100%);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        @media (max-width: 640px) {
            .mobile-title { font-size: 3.2rem !important; line-height: 1.1 !important; }
            .hexagon-shape { width: 140px; height: 160px; }
        }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-50 w-full px-4 py-4 backdrop-blur-lg">
        <div class="max-w-7xl mx-auto flex justify-between items-center bg-slate-900/50 border border-white/10 rounded-2xl p-2 px-4">
            <div class="flex items-center gap-2">
                <div class="w-7 h-7 bg-violet-600 rounded flex items-center justify-center font-black text-xs">V</div>
                <span class="chrome-text text-xl font-black italic tracking-tighter">VZ</span>
            </div>
            <a href="https://wa.me/5581995655408" class="bg-violet-600 text-white text-[9px] font-black px-4 py-2 rounded-full tracking-widest">CONTATO</a>
        </div>
    </nav>

    <header class="max-w-7xl mx-auto px-6 pt-16 pb-12 text-center">
        <h1 class="chrome-text mobile-title text-6xl md:text-9xl font-black mb-6 leading-tight uppercase">MÁQUINA DE <br> VENDAS</h1>
        <p class="italic text-violet-300/80 text-xl md:text-2xl mb-12 max-w-2xl mx-auto">Aceleramos seu lucro com design de elite.</p>
        <a href="https://wa.me/5581995655408?text=Quero%20começar" class="btn-chrome px-10 py-5 rounded-2xl font-black text-lg uppercase shadow-xl transition-all inline-block">QUERO COMEÇAR AGORA</a>
    </header>

    <!-- SEÇÃO COM O HEXAGONO -->
    <section class="max-w-7xl mx-auto px-6 py-12">
        <div class="glass-card md:col-span-2 p-8 md:p-12 rounded-[3rem] flex flex-col md:flex-row items-center gap-8 justify-between">
            <div class="flex-1">
                <h3 class="chrome-text text-3xl md:text-5xl font-black mb-4 uppercase italic leading-none">SITE DE PEDIDOS</h3>
                <p class="text-gray-400 font-medium text-lg leading-relaxed max-w-sm">
                    Elimine as taxas de 27% dos apps. Tenha um sistema próprio, rápido e integrado ao seu WhatsApp para lucrar 100% livre.
                </p>
            </div>

            <!-- O HEXAGONO COM A IMAGEM/ÍCONE -->
            <div class="hexagon-shape">
                <div class="hexagon-icon text-violet-400">
                    <svg class="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10 14l2-2 2 2m-2-2v6"></path>
                    </svg>
                </div>
            </div>
        </div>
    </section>

    <!-- PRICING -->
    <section class="max-w-md mx-auto px-6 py-12">
        <div class="glass-card p-10 rounded-[3.5rem] text-center border-violet-500/40">
            <p class="text-gray-400 text-[10px] font-black uppercase mb-2">Plano Digital</p>
            <div class="flex items-center justify-center gap-2 mb-10">
                <span class="chrome-text text-7xl font-black italic tracking-tighter leading-none">R$ 40</span>
                <span class="text-gray-500 font-bold italic">/mês</span>
            </div>
            <a href="https://wa.me/5581995655408" class="btn-chrome block w-full py-5 rounded-2xl text-[10px] font-black uppercase tracking-widest">ATIVAR MEU PAINEL</a>
        </div>
    </section>

    <footer class="py-12 text-center opacity-40">
        <span class="chrome-text font-black text-xs italic uppercase tracking-widest">VZ DIGITAL 2026</span>
    </footer>

</body>
</html>
