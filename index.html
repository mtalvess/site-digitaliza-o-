<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VZ | web & designer</title>
    
    <!-- Design & Typography -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #D4C3A3;
            --black: #050505;
        }
        body { 
            background-color: var(--black); 
            color: #F0F0F0; 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            overflow-x: hidden;
        }
        .font-serif { font-family: 'Playfair Display', serif; }
        
        /* Glassmorphism */
        .glass {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }

        /* Glow Effects */
        .glow-purple {
            background: radial-gradient(circle, rgba(88, 28, 135, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
        }
        .glow-navy {
            background: radial-gradient(circle, rgba(49, 46, 129, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
        }

        /* Buttons */
        .btn-gold {
            background: var(--gold);
            color: var(--black);
            box-shadow: 0 10px 30px rgba(212, 195, 163, 0.2);
            transition: all 0.3s ease;
        }
        .btn-gold:hover { transform: scale(1.03); filter: brightness(1.1); }
        
        .link-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .link-card:hover { 
            border-color: rgba(212, 195, 163, 0.4);
            background: rgba(255, 255, 255, 0.05);
            transform: translateY(-2px);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in { animation: fadeIn 0.6s ease forwards; }
    </style>
</head>
<body class="min-h-screen relative">

    <!-- Background -->
    <div class="fixed top-[-10%] right-[-10%] w-full h-full glow-purple -z-10"></div>
    <div class="fixed bottom-[-10%] left-[-10%] w-full h-full glow-navy -z-10"></div>

    <div class="max-w-md mx-auto px-6 py-16 flex flex-col items-center justify-center min-h-screen">
        
        <!-- Profile Header -->
        <header class="text-center mb-12 animate-in" style="animation-delay: 0.1s;">
            <div class="w-20 h-20 border-2 border-[#D4C3A3] flex items-center justify-center font-bold text-3xl text-[#D4C3A3] mx-auto mb-6 shadow-[0_0_30px_rgba(212,195,163,0.2)]">
                VZ
            </div>
            <h1 class="font-serif text-3xl tracking-widest uppercase mb-2">VZ | web & designer</h1>
            <p class="text-[#D4C3A3]/60 text-[10px] font-bold uppercase tracking-[0.4em]">High-End Digital Strategist</p>
        </header>

        <!-- Links Container -->
        <main class="w-full space-y-4 animate-in" style="animation-delay: 0.2s;">
            
            <!-- WhatsApp -->
            <a href="https://wa.me/5581995655408" target="_blank" class="glass link-card w-full p-5 rounded-2xl flex items-center justify-between group">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-green-500/10 rounded-full flex items-center justify-center">
                        <i data-lucide="message-circle" class="text-green-500 w-5 h-5"></i>
                    </div>
                    <span class="text-xs font-bold uppercase tracking-widest text-white/80">WhatsApp Business</span>
                </div>
                <i data-lucide="external-link" class="w-4 h-4 text-white/10 group-hover:text-[#D4C3A3]"></i>
            </a>

            <!-- Agendar Consultoria (Call to Action Principal) -->
            <a href="https://wa.me/5581995655408?text=Quero+marcar+uma+consultoria+VIP" class="btn-gold w-full p-5 rounded-2xl flex items-center justify-between group">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-black/10 rounded-full flex items-center justify-center">
                        <i data-lucide="calendar" class="text-black w-5 h-5"></i>
                    </div>
                    <span class="text-xs font-bold uppercase tracking-widest">Agendar Consultoria</span>
                </div>
                <i data-lucide="arrow-right" class="w-4 h-4 text-black/30 group-hover:translate-x-1 transition-transform"></i>
            </a>

            <!-- Portfólio de Elite -->
            <a href="https://seu-portfolio.com" class="glass link-card w-full p-5 rounded-2xl flex items-center justify-between group">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-[#D4C3A3]/10 rounded-full flex items-center justify-center">
                        <i data-lucide="globe" class="text-[#D4C3A3] w-5 h-5"></i>
                    </div>
                    <span class="text-xs font-bold uppercase tracking-widest text-white/80">Ver Portfólio de Luxo</span>
                </div>
                <i data-lucide="arrow-right" class="w-4 h-4 text-white/10 group-hover:text-[#D4C3A3]"></i>
            </a>

            <!-- Apresentação VIP (Serviços) -->
            <div class="pt-8 pb-4 text-center">
                <p class="text-[9px] font-bold uppercase tracking-[0.4em] text-white/20 mb-6">Nossas Especialidades</p>
                <div class="grid grid-cols-3 gap-3">
                    <div class="glass p-4 rounded-xl flex flex-col items-center">
                        <i data-lucide="layout" class="w-4 h-4 text-[#D4C3A3] mb-2"></i>
                        <span class="text-[8px] font-bold uppercase text-white/40">Sites Premium</span>
                    </div>
                    <div class="glass p-4 rounded-xl flex flex-col items-center">
                        <i data-lucide="smartphone" class="w-4 h-4 text-[#D4C3A3] mb-2"></i>
                        <span class="text-[8px] font-bold uppercase text-white/40">Mobile First</span>
                    </div>
                    <div class="glass p-4 rounded-xl flex flex-col items-center">
                        <i data-lucide="zap" class="w-4 h-4 text-[#D4C3A3] mb-2"></i>
                        <span class="text-[8px] font-bold uppercase text-white/40">Performance</span>
                    </div>
                </div>
            </div>

        </main>

        <footer class="mt-16 text-[9px] font-bold text-white/10 uppercase tracking-[0.6em] animate-in" style="animation-delay: 0.4s;">
            curated by vz digital © 2026
        </footer>

    </div>

    <script>
        // Inicializa os ícones do Lucide
        lucide.createIcons();
    </script>
</body>
</html>
