<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VZ | web & designer — Presença Digital de Elite</title>
    
    <!-- Scripts: React, Framer Motion, Tailwind, Lucide -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'gold-champagne': '#D4C3A3',
                        'luxury-black': '#050505',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],

    <style type="text/css">
        body {
            background-color: #050505;
            color: #F0F0F0;
            overflow-x: hidden;
        }
        .bg-glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .glow-purple {
            background: radial-gradient(circle, rgba(88, 28, 135, 0.2) 0%, rgba(0, 0, 0, 0) 70%);

        .glow-navy {
            background: radial-gradient(circle, rgba(49, 46, 129, 0.2) 0%, rgba(0, 0, 0, 0) 70%);

        .btn-gold {
            background-color: #D4C3A3;
            color: #050505;
            padding: 1rem 2.5rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.3s;
        }
        .btn-gold:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(212, 195, 163, 0.2);
        }
        .text-glow-gold {
            text-shadow: 0 0 30px rgba(212, 195, 163, 0.3);

</head>
<body>
    <div id="root"></div>

                    icon: "utensils",
                },
                {

                                <p className="text-xs text-white/40 leading-relaxed font-light transition-all">Design estratégico sem o uso de templates.</p>
                            </div>
                        </div>
                    </div>

                    <div className="w-full max-w-sm aspect-square relative flex items-center justify-center">

            const MainSite = () => (

                    <nav className="container mx-auto py-8 flex justify-between items-center group relative z-10">
                        <button onClick={() => setCurrentPage('selection')} className="flex items-center gap-4">

                                    <span className="block text-white font-serif italic text-lg tracking-wide">Últimas 2 vagas/mês</span>

                            </div>

                                    <p className="text-white/40 text-sm font-light leading-relaxed">{s.description}</p>
                                </div>

                                <Icon name="smartphone" className="absolute -bottom-10 -right-10 w-40 h-40 text-gold-champagne/10 rotate-12 group-hover:scale-125 transition-transform duration-700" />
                                <h2 className="font-serif text-3xl mb-4 text-white">Mobile First</h2>

                    </div>

                    <footer className="py-12 text-[11px] font-bold text-white/20 text-center uppercase tracking-[1em] border-t border-white/5 mt-20">

</body>
</html>
