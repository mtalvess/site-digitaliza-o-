<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VZ | Web & Designer Premium</title>

  <!-- Framer Motion via LazyMotion (bundle reduzido) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />

  <style>
    /* ── TOKENS ─────────────────────────────────────────────── */
    :root {
      --gold: #D4C3A3;
      --black: #0A0A0A;

      /* Escala modular 1.333 */
      --step-0: clamp(1rem,   0.95rem + 0.26vw, 1.125rem);
      --step-1: clamp(1.2rem, 1.1rem  + 0.52vw, 1.5rem);
      --step-2: clamp(1.5rem, 1.3rem  + 1vw,    2rem);
      --step-3: clamp(2rem,   1.6rem  + 2vw,    3rem);
      --step-4: clamp(3rem,   2rem    + 5vw,     7rem);

      /* Tracking */
      --track-hero:  -0.04em;
      --track-title: -0.02em;
      --track-label:  0.35em;

      /* Leading */
      --lead-display: 1.0;
      --lead-heading: 1.15;
      --lead-body:    1.75;
    }

    /* ── RESET & BASE ───────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--black);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: var(--step-0);
      line-height: var(--lead-body);
      overflow-x: hidden;
    }

    /* ── CURSOR MAGNÉTICO ───────────────────────────────────── */
    @media (pointer: fine) {
      * { cursor: none !important; }
    }
    .cursor-dot,
    .cursor-ring {
      position: fixed;
      top: 0; left: 0;
      pointer-events: none;
      z-index: 9999;
      will-change: transform;
    }
    .cursor-dot {
      width: 6px; height: 6px;
      background: var(--gold);
      border-radius: 50%;
      margin: -3px 0 0 -3px;
      transition: opacity .2s;
    }
    .cursor-ring {
      width: 36px; height: 36px;
      border: 1px solid rgba(212,195,163,.5);
      border-radius: 50%;
      margin: -18px 0 0 -18px;
      transition: transform .15s ease,
                  width .4s ease,
                  height .4s ease,
                  border-color .3s,
                  mix-blend-mode .2s;
    }
    .cursor-ring.magnetic {
      mix-blend-mode: difference;
      border-color: #fff;
    }

    /* ── MESH BACKGROUND ────────────────────────────────────── */
    .mesh-bg {
      position: fixed;
      inset: 0;
      z-index: -1;
      overflow: hidden;
      pointer-events: none;
    }
    .mesh-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      will-change: transform;
      animation: float-orb linear infinite;
    }
    @keyframes float-orb {
      0%   { transform: translate(0,0)       scale(1); }
      33%  { transform: translate(3%,5%)     scale(1.05); }
      66%  { transform: translate(-2%,3%)    scale(0.97); }
      100% { transform: translate(0,0)       scale(1); }
    }
    /* Grain noise overlay */
    .grain {
      position: absolute;
      inset: 0;
      opacity: .025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 128px;
    }

    /* ── GLASSMORPHISM AVANÇADO ─────────────────────────────── */
    .glass {
      background: linear-gradient(135deg,
        rgba(255,255,255,.04) 0%,
        rgba(255,255,255,.01) 100%
      );
      backdrop-filter: blur(24px) saturate(180%) brightness(1.05);
      -webkit-backdrop-filter: blur(24px) saturate(180%) brightness(1.05);
      border: 1px solid transparent;
      background-clip: padding-box;
      box-shadow:
        inset 0  1px 0 rgba(255,255,255,.08),
        inset 0 -1px 0 rgba(0,0,0,.2),
              0 32px 64px rgba(0,0,0,.4),
              0 0 0 1px rgba(212,195,163,.06);
    }

    /* ── CARD TILT 3D + BRILHO ──────────────────────────────── */
    .card-luxury {
      position: relative;
      transform-style: preserve-3d;
      transition: transform .4s cubic-bezier(.23,1,.32,1);
    }
    .card-luxury::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(
        600px circle at var(--mx,50%) var(--my,50%),
        rgba(212,195,163,.08),
        transparent 40%
      );
      border-radius: inherit;
      opacity: 0;
      transition: opacity .4s;
      pointer-events: none;
    }
    .card-luxury:hover::after { opacity: 1; }

    /* ── TIPOGRAFIA ─────────────────────────────────────────── */
    .type-serif   { font-family: 'Playfair Display', serif; }
    .type-display {
      font-family: 'Playfair Display', serif;
      font-weight: 400;
      letter-spacing: var(--track-hero);
      line-height:    var(--lead-display);
    }
    .type-label {
      font-family: 'Inter', sans-serif;
      font-size: .625rem;
      font-weight: 700;
      letter-spacing: var(--track-label);
      text-transform: uppercase;
    }
    .text-gold  { color: var(--gold); }
    .text-muted { color: rgba(255,255,255,.4); }

    /* ── BOTÕES ─────────────────────────────────────────────── */
    .btn-gold {
      display: inline-block;
      background: var(--gold);
      color: var(--black);
      font-weight: 800;
      font-size: .75rem;
      text-transform: uppercase;
      letter-spacing: .2em;
      border-radius: 9999px;
      padding: 1.25rem 3rem;
      transition: transform .5s cubic-bezier(.4,0,.2,1),
                  box-shadow .5s cubic-bezier(.4,0,.2,1);
      text-decoration: none;
    }
    .btn-gold:hover {
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 20px 40px rgba(212,195,163,.3);
    }

    /* ── SCROLLBAR ──────────────────────────────────────────── */
    ::-webkit-scrollbar              { width: 6px; }
    ::-webkit-scrollbar-track        { background: var(--black); }
    ::-webkit-scrollbar-thumb        { background: rgba(212,195,163,.2); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover  { background: var(--gold); }

    /* ── ANIMAÇÕES REVEAL (CSS fallback p/ mobile) ──────────── */
    @keyframes fade-up {
      from { opacity:0; transform:translateY(32px); filter:blur(6px); }
      to   { opacity:1; transform:translateY(0);    filter:blur(0); }
    }
    .fade-up {
      opacity: 0;
      animation: fade-up .8s cubic-bezier(.16,1,.3,1) forwards;
    }
    .delay-1 { animation-delay: .12s; }
    .delay-2 { animation-delay: .24s; }
    .delay-3 { animation-delay: .36s; }
    .delay-4 { animation-delay: .48s; }
    .delay-5 { animation-delay: .60s; }
  </style>
</head>
<body>

  <!-- ── CURSOR ─────────────────────────────────────────────── -->
  <div class="cursor-dot"  id="cd"></div>
  <div class="cursor-ring" id="cr"></div>

  <!-- ── MESH BACKGROUND ────────────────────────────────────── -->
  <div class="mesh-bg" aria-hidden="true">
    <div class="mesh-orb" style="
      background:radial-gradient(ellipse,rgba(212,195,163,.12) 0%,transparent 70%);
      width:80vw;height:80vw;top:-20%;left:-10%;animation-duration:18s;"></div>
    <div class="mesh-orb" style="
      background:radial-gradient(ellipse,rgba(212,195,163,.06) 0%,transparent 70%);
      width:60vw;height:60vw;bottom:-10%;right:-5%;animation-duration:24s;animation-delay:-8s;"></div>
    <div class="mesh-orb" style="
      background:radial-gradient(ellipse,rgba(255,255,255,.04) 0%,transparent 70%);
      width:40vw;height:40vw;top:40%;left:55%;animation-duration:30s;animation-delay:-15s;"></div>
    <div class="grain"></div>
  </div>

  <div id="root"></div>

  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect, useRef, useLayoutEffect } = React;

    /* ── FRAMER MOTION DETECTION ──────────────────────────── */
    const getMotion = () => {
      const lib = window.Motion || window.framerMotion
               || window.framer_motion || window.FramerMotion;
      if (lib) return { motion: lib.motion || lib, AnimatePresence: lib.AnimatePresence };
      return {
        motion: new Proxy({}, {
          get: (_, prop) => ({ initial,animate,exit,transition,
            whileHover,whileTap,whileInView,viewport,...rest }) =>
            React.createElement(prop, rest)
        }),
        AnimatePresence: ({ children }) => <>{children}</>
      };
    };
    const { motion, AnimatePresence } = getMotion();

    /* ── LUCIDE ICON ──────────────────────────────────────── */
    const Icon = ({ name, style }) => {
      useLayoutEffect(() => {
        window.lucide?.createIcons?.();
      }, [name]);
      return <i data-lucide={name} style={{ width:24, height:24, ...style }} />;
    };

    /* ── CURSOR MAGNÉTICO ─────────────────────────────────── */
    const MagneticCursor = () => {
      const dot  = useRef(null);
      const ring = useRef(null);
      const pos  = useRef({ x:0, y:0 });
      const rp   = useRef({ x:0, y:0 });
      const raf  = useRef(null);

      useEffect(() => {
        const isFine = window.matchMedia('(pointer:fine)').matches;
        if (!isFine) return;

        const onMove = e => { pos.current = { x: e.clientX, y: e.clientY }; };
        const lerp   = (a, b, t) => a + (b - a) * t;

        const tick = () => {
          if (!dot.current || !ring.current) return;
          rp.current.x = lerp(rp.current.x, pos.current.x, .08);
          rp.current.y = lerp(rp.current.y, pos.current.y, .08);
          dot.current.style.transform  = `translate(${pos.current.x}px,${pos.current.y}px)`;
          ring.current.style.transform = `translate(${rp.current.x}px,${rp.current.y}px)`;
          raf.current = requestAnimationFrame(tick);
        };

        const onEnter = e => {
          const r  = e.currentTarget.getBoundingClientRect();
          const cx = r.left + r.width / 2;
          const cy = r.top  + r.height / 2;
          ring.current.style.transform = `translate(${cx}px,${cy}px) scale(2.5)`;
          ring.current.classList.add('magnetic');
        };
        const onLeave = () => ring.current.classList.remove('magnetic');

        window.addEventListener('mousemove', onMove);
        document.querySelectorAll('[data-magnetic]').forEach(el => {
          el.addEventListener('mouseenter', onEnter);
          el.addEventListener('mouseleave', onLeave);
        });
        raf.current = requestAnimationFrame(tick);
        return () => {
          window.removeEventListener('mousemove', onMove);
          cancelAnimationFrame(raf.current);
        };
      }, []);

      return null; // elementos já estão no HTML estático
    };

    /* ── CARD TILT HOOK ───────────────────────────────────── */
    const useTilt = () => {
      const ref = useRef(null);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const onMove = e => {
          const r  = el.getBoundingClientRect();
          const x  = ((e.clientX - r.left) / r.width  - .5) * 14;
          const y  = ((e.clientY - r.top)  / r.height - .5) * -14;
          const mx = ((e.clientX - r.left) / r.width)  * 100;
          const my = ((e.clientY - r.top)  / r.height) * 100;
          el.style.transform = `perspective(800px) rotateY(${x}deg) rotateX(${y}deg)`;
          el.style.setProperty('--mx', `${mx}%`);
          el.style.setProperty('--my', `${my}%`);
          el.style.willChange = 'transform';
        };
        const onLeave = () => {
          el.style.transform  = 'perspective(800px) rotateY(0deg) rotateX(0deg)';
          el.style.willChange = 'auto';
        };
        el.addEventListener('mousemove', onMove);
        el.addEventListener('mouseleave', onLeave);
        return () => {
          el.removeEventListener('mousemove', onMove);
          el.removeEventListener('mouseleave', onLeave);
        };
      }, []);
      return ref;
    };

    /* ── FRAMER VARIANTS ──────────────────────────────────── */
    const container = {
      hidden: {},
      visible: { transition: { staggerChildren: .12, delayChildren: .2 } }
    };
    const itemReveal = {
      hidden:  { opacity: 0, y: 32, filter: 'blur(6px)' },
      visible: {
        opacity: 1, y: 0, filter: 'blur(0px)',
        transition: { duration: .8, ease: [.16,1,.3,1] }
      }
    };
    const wordReveal = {
      hidden:  { opacity: 0, y: '110%', rotate: 4 },
      visible: {
        opacity: 1, y: '0%', rotate: 0,
        transition: { duration: .6, ease: [.22,1,.36,1] }
      }
    };

    /* ── SPLIT TITLE ──────────────────────────────────────── */
    const SplitTitle = ({ text, className = '' }) => (
      <motion.span
        variants={container}
        initial="hidden"
        animate="visible"
        className={className}
        style={{ display:'flex', flexWrap:'wrap', gap:'0 .3em' }}
      >
        {text.split(' ').map((w, i) => (
          <span key={i} style={{ overflow:'hidden', display:'inline-block' }}>
            <motion.span variants={wordReveal} style={{ display:'inline-block' }}>{w}</motion.span>
          </span>
        ))}
      </motion.span>
    );

    /* ── DATA ─────────────────────────────────────────────── */
    const SERVICES = [
      { icon:'globe',    title:'Landing Pages de Elite',      desc:'Arquitetura persuasiva que converte tráfego em clientes de alto ticket.' },
      { icon:'palette',  title:'Identidade Visual Premium',   desc:'Marcas memoráveis que exalam autoridade e sofisticação.' },
      { icon:'utensils', title:'Cardápios Digitais de Luxo',  desc:'A joia tecnológica para o setor gastronômico premium.' },
    ];

    const PORTFOLIO = [
      { title:'Landing Pages',    tag:'Arquitetura de Conversão', img:'https://images.unsplash.com/photo-1460925895917-afdab827c52f?auto=format&fit=crop&q=80&w=2426', desc:'Engenharia visual focada em transformar cliques em faturamento real.' },
      { title:'Identidade Visual',tag:'Branding de Luxo',         img:'https://images.unsplash.com/photo-1561070791-2526d30994b5?auto=format&fit=crop&q=80&w=2000', desc:'A alma da sua marca em formas, tons e tipografias de elite.' },
      { title:'Cardápios Digitais',tag:'UX Premium',              img:'https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&q=80&w=2070', desc:'Gastronomia apresentada com sofisticação tecnológica.' },
    ];

    /* ── PAGES ────────────────────────────────────────────── */

    /* — Selection — */
    const SelectionPage = ({ go }) => (
      <div style={{ minHeight:'100svh', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'1.5rem', gap:'3rem' }}>
        <div style={{ textAlign:'center' }}>
          <motion.div
            initial={{ scale:.8, opacity:0 }}
            animate={{ scale:1,  opacity:1 }}
            transition={{ duration:.6, ease:[.16,1,.3,1] }}
            style={{ display:'inline-flex', alignItems:'center', justifyContent:'center',
              width:96, height:96, border:'2px solid var(--gold)', borderRadius:24,
              fontFamily:"'Playfair Display',serif", fontSize:'2.5rem', color:'var(--gold)',
              marginBottom:'1.5rem', position:'relative' }}
          >
            VZ
            <span style={{ position:'absolute', top:-4, right:-4, width:14, height:14,
              background:'#dc2626', borderRadius:'50%' }} />
          </motion.div>

          <h1 className="fade-up type-display" style={{
            fontSize:'clamp(2rem,5vw,3.5rem)', color:'#fff', textAlign:'center',
            letterSpacing:'.3em', textTransform:'uppercase' }}>
            VZ | web &amp; designer
          </h1>
          <p className="fade-up delay-1 type-label text-gold"
            style={{ marginTop:'.75rem', opacity:.8 }}>
            Design Digital Estratégico &amp; Identidade de Luxo
          </p>
        </div>

        <div className="fade-up delay-2" style={{ width:'100%', maxWidth:380, display:'flex', flexDirection:'column', gap:'1rem' }}>
          <p className="type-label text-muted" style={{ textAlign:'center' }}>
            Disponibilidade limitada · 2 projetos/mês
          </p>

          {/* WhatsApp */}
          <a href="https://wa.me/5581995655408" target="_blank" data-magnetic
            className="glass" style={{ display:'flex', alignItems:'center', justifyContent:'space-between',
              padding:'1.5rem 1.75rem', borderRadius:28, textDecoration:'none', transition:'transform .4s' }}
            onMouseEnter={e => e.currentTarget.style.transform='translateY(-4px)'}
            onMouseLeave={e => e.currentTarget.style.transform='translateY(0)'}>
            <div style={{ display:'flex', alignItems:'center', gap:'1.25rem' }}>
              <div style={{ width:52, height:52, background:'rgba(37,211,102,.1)', borderRadius:16,
                display:'flex', alignItems:'center', justifyContent:'center' }}>
                <Icon name="message-circle" style={{ color:'#25D366' }} />
              </div>
              <div>
                <span style={{ display:'block', fontWeight:700, fontSize:'.875rem',
                  letterSpacing:'.1em', textTransform:'uppercase', color:'rgba(255,255,255,.9)' }}>
                  Solicitar Orçamento
                </span>
                <span className="type-label text-muted" style={{ fontSize:'.5rem', marginTop:4 }}>
                  Direct Premium
                </span>
              </div>
            </div>
            <Icon name="external-link" style={{ color:'rgba(255,255,255,.15)' }} />
          </a>

          {/* Manifesto */}
          <button onClick={() => go('presentation')} data-magnetic
            className="glass" style={{ display:'flex', alignItems:'center', justifyContent:'space-between',
              padding:'1.5rem 1.75rem', borderRadius:28, background:'transparent',
              border:'1px solid rgba(255,255,255,.1)', color:'#fff', width:'100%',
              transition:'transform .4s', cursor:'none' }}
            onMouseEnter={e => e.currentTarget.style.transform='translateY(-4px)'}
            onMouseLeave={e => e.currentTarget.style.transform='translateY(0)'}>
            <div style={{ display:'flex', alignItems:'center', gap:'1.25rem' }}>
              <div style={{ width:52, height:52, background:'rgba(212,195,163,.05)', borderRadius:16,
                display:'flex', alignItems:'center', justifyContent:'center' }}>
                <Icon name="award" style={{ color:'var(--gold)' }} />
              </div>
              <div style={{ textAlign:'left' }}>
                <span style={{ display:'block', fontWeight:700, fontSize:'.875rem',
                  letterSpacing:'.1em', textTransform:'uppercase' }}>O Manifesto</span>
                <span className="type-label text-muted" style={{ fontSize:'.5rem', marginTop:4 }}>
                  Visão VZ | web &amp; designer
                </span>
              </div>
            </div>
            <Icon name="chevron-right" style={{ color:'rgba(255,255,255,.15)' }} />
          </button>

          {/* Estúdio */}
          <button onClick={() => go('site')} data-magnetic
            style={{ display:'flex', alignItems:'center', justifyContent:'space-between',
              padding:'1.5rem 1.75rem', borderRadius:28, background:'var(--gold)',
              border:'none', color:'var(--black)', width:'100%', cursor:'none',
              boxShadow:'0 40px 80px rgba(212,195,163,.15)',
              transition:'transform .5s, box-shadow .5s' }}
            onMouseEnter={e => {
              e.currentTarget.style.transform='scale(1.03)';
              e.currentTarget.style.boxShadow='0 40px 100px rgba(212,195,163,.25)';
            }}
            onMouseLeave={e => {
              e.currentTarget.style.transform='scale(1)';
              e.currentTarget.style.boxShadow='0 40px 80px rgba(212,195,163,.15)';
            }}>
            <div style={{ display:'flex', alignItems:'center', gap:'1.25rem' }}>
              <div style={{ width:52, height:52, background:'rgba(10,10,10,.1)', borderRadius:16,
                display:'flex', alignItems:'center', justifyContent:'center' }}>
                <Icon name="globe" />
              </div>
              <div style={{ textAlign:'left' }}>
                <span style={{ display:'block', fontWeight:800, fontSize:'.875rem',
                  letterSpacing:'.1em', textTransform:'uppercase' }}>Estúdio VZ</span>
                <span style={{ display:'block', fontSize:'.5rem', opacity:.5,
                  letterSpacing:'.3em', fontWeight:900, marginTop:4, textTransform:'uppercase' }}>
                  Performance &amp; Luxo
                </span>
              </div>
            </div>
            <Icon name="arrow-right" />
          </button>
        </div>
      </div>
    );

    /* — Presentation — */
    const PresentationPage = ({ go }) => (
      <motion.div
        initial={{ opacity:0 }} animate={{ opacity:1 }} exit={{ opacity:0 }}
        style={{ position:'fixed', inset:0, zIndex:50, background:'var(--black)',
          padding:'2rem', display:'flex', flexDirection:'column',
          alignItems:'center', justifyContent:'center', overflowY:'auto' }}>

        {/* dot grid */}
        <div aria-hidden style={{ position:'absolute', inset:0, opacity:.03, zIndex:-1,
          backgroundImage:'radial-gradient(#D4C3A3 1px,transparent 1px)',
          backgroundSize:'40px 40px' }} />

        <button onClick={() => go('selection')} style={{
          position:'fixed', top:24, right:24, zIndex:60,
          display:'flex', alignItems:'center', gap:8,
          background:'rgba(255,255,255,.05)', backdropFilter:'blur(20px)',
          border:'1px solid rgba(255,255,255,.1)', borderRadius:16,
          padding:'10px 16px', color:'rgba(255,255,255,.4)',
          cursor:'none', transition:'color .3s' }}
          onMouseEnter={e => e.currentTarget.style.color='#fff'}
          onMouseLeave={e => e.currentTarget.style.color='rgba(255,255,255,.4)'}>
          <span className="type-label" style={{ fontSize:'.5rem' }}>Voltar ao Início</span>
          <Icon name="x" style={{ width:18, height:18 }} />
        </button>

        <motion.div
          variants={container} initial="hidden" animate="visible"
          style={{ width:'100%', maxWidth:720, display:'flex', flexDirection:'column', gap:'2.5rem' }}>

          <motion.div variants={itemReveal}>
            <span style={{ display:'inline-block', color:'var(--gold)', fontSize:'.625rem',
              fontWeight:700, letterSpacing:'.5em', textTransform:'uppercase',
              padding:'6px 16px', border:'1px solid rgba(212,195,163,.3)',
              borderRadius:9999, marginBottom:'1rem' }}>VZ | web &amp; designer</span>
            <h2 style={{ fontFamily:"'Playfair Display',serif", fontSize:'clamp(2.5rem,8vw,5rem)',
              lineHeight:1, color:'#fff', letterSpacing:'-.04em' }}>
              Supremacia <br />
              <span style={{ fontStyle:'italic', fontWeight:400, color:'var(--gold)' }}>Digital.</span>
            </h2>
          </motion.div>

  <script>
    (function () {
      const dot  = document.getElementById('cd');
      const ring = document.getElementById('cr');
      let pos = {x:0,y:0}, rp = {x:0,y:0}, raf;
      const lerp = (a,b,t) => a+(b-a)*t;
      window.addEventListener('mousemove', e => { pos.x=e.clientX; pos.y=e.clientY; });
      (function tick(){
        rp.x = lerp(rp.x, pos.x, .08);
        rp.y = lerp(rp.y, pos.y, .08);
        dot.style.transform  = `translate(${pos.x}px,${pos.y}px)`;
        ring.style.transform = `translate(${rp.x}px,${rp.y}px)`;
        raf = requestAnimationFrame(tick);
      })();
    })();
