<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VZ Digital — Sistema Premium</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{font-family:'Inter',sans-serif;background:#020202;color:#fff;overflow-x:hidden}
.chrome-text{
font-family:'Cinzel',serif;
background:linear-gradient(180deg,#ffffff 0%,#f8fafc 45%,#a78bfa 50%,#7c3aed 55%,#c084fc 100%);
-webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.glass{
background:rgba(255,255,255,0.03);
border:1px solid rgba(139,92,246,0.2);
backdrop-filter:blur(16px);
transition:.3s;
}
.glass:hover{transform:translateY(-6px);border-color:#7c3aed}
.selected{
border:2px solid #7c3aed !important;
box-shadow:0 0 30px rgba(124,58,237,0.5);
}
.hidden-section{display:none}
.btn-premium{
background:linear-gradient(135deg,#7c3aed,#4c1d95);
}
.btn-premium:hover{
transform:scale(1.05);
}
</style>
</head>

<body class="min-h-screen">

<!-- LANDING -->
<section id="landing" class="min-h-screen flex flex-col justify-center items-center text-center px-6">
<h1 class="chrome-text text-6xl md:text-8xl font-black mb-10 uppercase">
VENDA MAIS.<br>TRABALHE MENOS.
</h1>

<p class="text-slate-400 text-xl max-w-2xl mb-12">
Site, Portfólio ou Cardápio Digital entregue em 48h.
</p>

<button onclick="irEscolha()"
class="btn-premium px-12 py-6 rounded-3xl font-black uppercase tracking-widest">
COMEÇAR AGORA
</button>
</section>

<!-- ESCOLHA -->
<section id="escolha" class="hidden-section min-h-screen flex flex-col items-center justify-center px-6 py-20">

<h2 class="chrome-text text-5xl font-black mb-16 uppercase">
Escolha Seu Produto
</h2>

<div class="grid md:grid-cols-3 gap-8 w-full max-w-6xl mb-16">

<div class="glass p-10 rounded-3xl cursor-pointer text-center"
onclick="selectProduct(this,'Portfólio Digital')">
<h3 class="text-2xl font-black mb-4">Portfólio Digital</h3>
<p class="text-slate-400 text-sm">Autoridade profissional.</p>
</div>

<div class="glass p-10 rounded-3xl cursor-pointer text-center"
onclick="selectProduct(this,'Site Profissional')">
<h3 class="text-2xl font-black mb-4">Site Profissional</h3>
<p class="text-slate-400 text-sm">Presença forte online.</p>
</div>

<div class="glass p-10 rounded-3xl cursor-pointer text-center"
onclick="selectProduct(this,'Cardápio Digital')">
<h3 class="text-2xl font-black mb-4">Cardápio Digital</h3>
<p class="text-slate-400 text-sm">Venda automática no WhatsApp.</p>
</div>

</div>

<button id="continuarBtn"
onclick="finalizar()"
class="btn-premium px-12 py-6 rounded-3xl font-black uppercase tracking-widest opacity-40 cursor-not-allowed">
CONTINUAR PARA PAGAMENTO
</button>

<button onclick="voltarLanding()" class="mt-6 text-slate-500 text-sm">
Voltar
</button>

</section>

<!-- ADMIN -->
<section id="admin" class="hidden-section min-h-screen px-10 py-20">

<h2 class="chrome-text text-4xl font-black mb-10 uppercase">
Painel Administrativo
</h2>

<div id="loginArea">
<input type="password" id="senha"
placeholder="Senha Admin"
class="bg-gray-900 p-4 rounded-xl w-64">
<button onclick="login()" class="btn-premium px-6 py-3 rounded-xl ml-2">
Entrar
</button>
</div>

<div id="painel" class="hidden mt-10 space-y-4"></div>

<button onclick="limparPedidos()" class="mt-8 bg-red-600 px-6 py-3 rounded-xl text-sm font-bold">
Limpar Registros
</button>

</section>

<script>
let produtoSelecionado = null;

/* NAVEGAÇÃO */
function irEscolha(){
document.getElementById("landing").classList.add("hidden-section");
document.getElementById("escolha").classList.remove("hidden-section");
}

function voltarLanding(){
document.getElementById("escolha").classList.add("hidden-section");
document.getElementById("landing").classList.remove("hidden-section");
}

/* ESCOLHA */
function selectProduct(element,produto){
produtoSelecionado = produto;
document.querySelectorAll('.glass').forEach(c=>c.classList.remove('selected'));
element.classList.add('selected');
document.getElementById("continuarBtn").classList.remove("opacity-40","cursor-not-allowed");
}

/* FINALIZAR */
function finalizar(){
if(!produtoSelecionado) return;

let pedidos = JSON.parse(localStorage.getItem("pedidosVZ")) || [];

pedidos.push({
produto: produtoSelecionado,
data: new Date().toLocaleString()
});

localStorage.setItem("pedidosVZ", JSON.stringify(pedidos));

window.location.href="https://pay.kiwify.com.br/r8cOjsL";
}

/* ADMIN VIA HASH */
if(window.location.hash === "#admin"){
document.getElementById("landing").classList.add("hidden-section");
document.getElementById("admin").classList.remove("hidden-section");
}

/* LOGIN */
function login(){
if(document.getElementById("senha").value !== "VZ2026") return;

document.getElementById("loginArea").classList.add("hidden");
document.getElementById("painel").classList.remove("hidden");

mostrarPedidos();
}

function mostrarPedidos(){
let pedidos = JSON.parse(localStorage.getItem("pedidosVZ")) || [];
let painel = document.getElementById("painel");
painel.innerHTML="";

if(pedidos.length === 0){
painel.innerHTML="<p class='text-slate-500'>Nenhum pedido ainda.</p>";
return;
}

pedidos.reverse().forEach(p=>{
painel.innerHTML+=`
<div class="bg-gray-900 p-6 rounded-2xl border border-violet-500/30">
<strong>${p.produto}</strong><br>
<small>${p.data}</small>
</div>
`;
});
}

function limparPedidos(){
localStorage.removeItem("pedidosVZ");
mostrarPedidos();
}
</script>

</body>
</html>
